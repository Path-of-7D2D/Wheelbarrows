name: Release

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: "Release version tag, for example v0.1.0"
        required: true
        default: "0.1.0"

permissions:
  contents: write

jobs:
  release:
    name: Build release zip
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Validate release inputs
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! "${{ inputs.version_tag }}" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "version_tag must look like v0.1.0 or 0.1.0"
            exit 1
          fi

          if [[ ! -d "1A-Wheelbarrow" ]]; then
            echo "Expected 1A-Wheelbarrow to exist."
            exit 1
          fi

          if [[ ! -f "1A-Wheelbarrow/ModInfo.xml" ]]; then
            echo "Expected 1A-Wheelbarrow/ModInfo.xml to exist."
            exit 1
          fi

          if [[ ! -f "1A-Wheelbarrow/Wheelbarrow.dll" ]]; then
            echo "Expected 1A-Wheelbarrow/Wheelbarrow.dll to exist."
            exit 1
          fi

          if [[ ! -f "1A-Wheelbarrow/Resources/wheelbarrow.unity3d" ]]; then
            echo "Expected 1A-Wheelbarrow/Resources/wheelbarrow.unity3d to exist."
            exit 1
          fi

      - name: Create mod zip
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p artifacts
          zip_name="Wheelbarrow-${{ inputs.version_tag }}.zip"
          zip_name="${zip_name//\//-}"

          zip -r "artifacts/${zip_name}" "1A-Wheelbarrow"
          echo "ZIP_PATH=artifacts/${zip_name}" >> "$GITHUB_ENV"

      - name: Generate changelog
        uses: Path-of-7D2D/Changelog-Generator@main
        with:
          version_tag: ${{ inputs.version_tag }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          output_path: CHANGELOG.md

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.version_tag }}
          name: Wheelbarrow ${{ inputs.version_tag }}
          body_path: CHANGELOG.md
          files: ${{ env.ZIP_PATH }}
          fail_on_unmatched_files: true
